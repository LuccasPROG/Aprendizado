<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{font-family: 'Times New Roman', Times, serif;}

    </style>
</head>
<body>
    <form action="#" method="get" target="_blank">
        <section>
        <h1>Seja bem Vindo a Natal</h1>
        <p>Painel de Viagem</p>
        <p>painel de login</p>
        <p>
            Login: <input type="text" id="nomes" name="nome" placeholder="Seu Login Aqui" required><br> <br>
            Senha: <input type="password" id="senhas" name="senha" placeholder="Sua Senha Aqui"required>
        </p>
        <p>
            Genero: <br>
            Masculino<input type="radio" id="Masculino" name="genero" value="Masculino"><br>
            Feminino<input type="radio" id="Feminino" name="genero" value="Feminino"><br>
        </p>
            Date: <input type="date" id="date" name="date" required value="2026-03-10"><br><br>
            datetime: <input type="datetime-local" id="datetime" name="datetime" required value="2026-03-10T06:00"><br><br>
            time: <input type="time" id="time" name="time" required ><br><br>
            file: <input type="file" id="file" name="file" required accept="png" ><br><br>
            number: <input type="number" id="number" name="number" required placeholder="escolha seu numero:"><br><br>
            color: <input type="color" id="color" name="color" required placeholder=""><br><br>
            email: <input type="email" id="email" name="email" required placeholder="ex.: exemplo123@gmail.com"><br><br>
        <p>
            <button type="submit">Enviar</button>
            <button type="reset">Reset</button>
        </p>
        </section>
    </form>
</body>
</html>
